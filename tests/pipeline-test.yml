# Representative pipeline-test config based on example-configs/qubes-os-main.yml.

git:
  baseurl: https://github.com
  prefix: QubesOS/qubes-
  branch: main
  maintainers:
    # marmarek
    - '0064428F455451B3EBE78A7F063938BA42CFA724'
    # simon
    - '274E12AB03F2FE293765FC06DA0434BC706E1FCF'

backend-vmm: xen
debug: true
verbose: true
qubes-release: r4.3

distributions:
  - host-fc41
  - vm-bookworm
  - vm-win10:
      stages:
        - build:
            configuration: release
            sign-qube: vault-sign
            sign-key-name: "Qubes Windows Tools"
            test-sign: true
            executor:
              type: windows
              options:
                dispvm: win-build
                user: user
                ewdk: tools/windows/ewdk.iso
                threads: 1

templates:
  - fedora-42-xfce:
      dist: fc42
      flavor: xfce
  - debian-13-xfce:
      dist: trixie
      flavor: xfce

components:
  - builder-rpm:
      packages: False
      branch: main
  - builder-debian:
      packages: False
      branch: main
  - core-vchan-xen
  - vmm-xen-windows-pvdrivers

sign-key:
  rpm: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
  deb: BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
  windows: CCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC

gpg-client: gpg

repository-publish:
  components: current-testing
  templates: templates-itl-testing

executor:
  type: qubes
  options:
    dispvm: "@dispvm"

stages:
  - fetch
  - prep
  - build
  - post
  - verify
  - sign:
      executor:
        type: local
  - publish:
      executor:
        type: local
  - upload:
      executor:
        type: local
