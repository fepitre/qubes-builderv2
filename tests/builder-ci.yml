git:
  baseurl: https://github.com
  prefix: QubesOS/qubes-
  maintainers:
    # marmarek
    - '0064428F455451B3EBE78A7F063938BA42CFA724'
    # simon
    - '274E12AB03F2FE293765FC06DA0434BC706E1FCF'
    # fepitre's ITL
    - '77EEEF6D0386962AEA8CF84A9B8273F80AC219E6'
    # fepitre's Qubes OS
    - '9FA64B92F95E706BF28E2CA6484010B5CDC576E2'

backend-vmm: xen

debug: true
verbose: true
qubes-release: r4.2

use-qubes-repo:
  version: 4.2
  testing: True

gpg-client: gpg

sign-key:
  rpm: 632F8C69E01B25C9E0C3ADF2F360C0D259FB650C
  deb: 632F8C69E01B25C9E0C3ADF2F360C0D259FB650C
  archlinux: 632F8C69E01B25C9E0C3ADF2F360C0D259FB650C
  iso: 632F8C69E01B25C9E0C3ADF2F360C0D259FB650C
  windows: 632F8C69E01B25C9E0C3ADF2F360C0D259FB650C

iso:
  kickstart: conf/iso-online-testing.ks

distributions:
  - host-fc37
  - vm-win10:
      stages:
        - build:
            configuration: release
            sign-qube: win-sign-test
            sign-key-name: "Qubes Windows Tools"
            test-sign: true
            executor:
              type: windows
              options:
                dispvm: win-builder-dvm
                user: user
                ewdk: /home/user/ewdk.iso
                threads: 2
  - vm-bullseye
  - vm-bookworm
  - vm-trixie
  - vm-fc40
  - vm-fc41
  - vm-fc42
  - vm-fc43
  - vm-archlinux
  - vm-focal
  - vm-jammy
  - vm-noble

key-dirs:
  - keys

components:
  - builder-rpm:
      packages: False
  - builder-debian:
      packages: False
  - builder-archlinux:
      packages: False
  - qubes-release:
      packages: False
      branch: release4.2
  - template-whonix:
      packages: False
      url: https://github.com/Whonix/qubes-template-whonix
      branch: trixie
      maintainers:
        - 916B8D99C38EAF5E8ADC7A2A8D66066A2EEACCDA
  - template-kicksecure:
      packages: False
      branch: trixie
      url: https://github.com/Kicksecure/qubes-template-kicksecure.git
      maintainers:
        - 916B8D99C38EAF5E8ADC7A2A8D66066A2EEACCDA
  - example-advanced:
      url: https://github.com/fepitre/qubes-example-advanced
      branch: main
      maintainers:
        # fepitre's @invisiblethingslab.com
        - 77EEEF6D0386962AEA8CF84A9B8273F80AC219E6
  - python-qasync:
      branch: v0.23.0-2

templates:
  - fedora-43-xfce:
      dist: fc43
      flavor: xfce
  - fedora-43-minimal:
      dist: fc43
      flavor: minimal
  - centos-stream-8:
      dist: centos-stream8
  - debian-12:
      dist: bookworm
      options:
        - standard
        - firmware
  - debian-12-minimal:
      dist: bookworm
      flavor: minimal
  - whonix-gateway-18:
      dist: trixie
      flavor: whonix-gateway
      options:
        - minimal
        - no-recommends
  - whonix-workstation-18:
      dist: trixie
      flavor: whonix-workstation
      options:
        - minimal
        - no-recommends
  - kicksecure-18:
      dist: trixie
      flavor: kicksecure
      options:
        - minimal
        - no-recommends
  - archlinux:
      dist: archlinux

less-secure-signed-commits-sufficient:
  - builder-rpm
  - builder-debian
  - builder-archlinux
  - template-whonix
  - template-kicksecure
  - vmm-xen
  - vmm-xen-guest
  - qubes-release
  - example-advanced
  - python-qasync

repository-publish:
  components: current-testing
  templates: templates-itl-testing

executor:
  type: docker
  options:
    image: "qubes-builder-fedora:latest"

stages:
  - fetch
  - prep
  - pre
  - build
  - post
  - verify
  - sign:
      executor:
        type: local
  - publish:
      executor:
        type: local
  - upload:
      executor:
        type: local

mirrors:
  archlinux:
    - http://archlinux.mirrors.ovh.net/archlinux
    - http://mirrors.gandi.net/archlinux
    - https://arch.yourlabs.org
  debian:
    - http://ftp.fr.debian.org/debian
