git:
  baseurl: https://github.com
  prefix: QubesOS/qubes-
  branch: main
  maintainers:
    # marmarek
    - '0064428F455451B3EBE78A7F063938BA42CFA724'
    # simon
    - '274E12AB03F2FE293765FC06DA0434BC706E1FCF'

debug: true
verbose: true

# This is for anything other than building, so source fetching etc
executor:
  type: qubes
  options:
    dispvm: qubes-builder-dvm

distributions:
  - vm-win10:
      stages:
        - build:
            configuration: release
            sign-qube: vault-sign
            sign-key-name: "Qubes Windows Tools"
            test-sign: true
            executor:
              #type: windows-ssh
              type: windows
              options:
                dispvm: win-build
                user: user
                ewdk: tools/windows/ewdk.iso
                threads: 1
                #ssh-ip: 10.137.0.20
                #ssh-key-path: /home/user/.ssh/win-build.key

components:
  - vmm-xen-windows-pvdrivers
  - core-vchan-xen
  - windows-utils
  - core-qubesdb
  - core-agent-windows
  - gui-common
  - gui-agent-windows
  - installer-qubes-os-windows-tools
